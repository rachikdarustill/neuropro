:2px;background:#2F2F2F;border-radius:1px;margin:0 0 16px;\"><\u002Fdiv>\n              <p style=\"margin:0;font-size:15.5px;line-height:1.6;color:#5F5F5F;\">Создаём цифровых агентов для поддержки, продаж, обработки документов, аналитики и внутренних операций<\u002Fp>\n            <\u002Fdiv>\n\n            <div data-reveal=\"\" style=\"border:1px solid #D0D0D0;border-radius:14px;padding:34px 30px;background:#fff;box-shadow:0 16px 38px -20px rgba(0,0,0,.22);\">\n              <h3 style=\"margin:0 0 14px;font-size:21px;color:#2F2F2F;font-weight:700;letter-spacing:-0.01em;\">ИИ внутри процессов<\u002Fh3>\n              <div style=\"width:40px;height:2px;background:#2F2F2F;border-radius:1px;margin:0 0 16px;\"><\u002Fdiv>\n              <p style=\"margin:0;font-size:15.5px;line-height:1.6;color:#5F5F5F;\">Встраиваем искусственный интеллект в существующие бизнес-процессы, ЦРМ, базы знаний и внутренние системы<\u002Fp>\n            <\u002Fdiv>\n\n            <div data-reveal=\"\" style=\"border:1px solid #D0D0D0;border-radius:14px;padding:34px 30px;background:#fff;box-shadow:0 16px 38px -20px rgba(0,0,0,.22);\">\n              <h3 style=\"margin:0 0 14px;font-size:21px;color:#2F2F2F;font-weight:700;letter-spacing:-0.01em;\">Цифровые продукты<\u002Fh3>\n              <div style=\"width:40px;height:2px;background:#2F2F2F;border-radius:1px;margin:0 0 16px;\"><\u002Fdiv>\n              <p style=\"margin:0;font-size:15.5px;line-height:1.6;color:#5F5F5F;\">Разрабатываем веб-сервисы, кабинеты, платформы и внутренние системы автоматизации под ключ<\u002Fp>\n            <\u002Fdiv>\n\n            <div data-reveal=\"\" style=\"border:1px solid #D0D0D0;border-radius:14px;padding:34px 30px;background:#fff;box-shadow:0 16px 38px -20px rgba(0,0,0,.22);\">\n              <h3 style=\"margin:0 0 14px;font-size:21px;color:#2F2F2F;font-weight:700;letter-spacing:-0.01em;\">ИИ-аутстафф<\u002Fh3>\n              <div style=\"width:40px;height:2px;background:#2F2F2F;border-radius:1px;margin:0 0 -3px);box-shadow:0 18px 38px rgba(0,0,0,.35);background:#E6E6E6;\">Оставить заявку<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fform>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ notHome }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"max-width:1440px;margin:0 auto;background:#fff;border:1px solid #D0D0D0;border-radius:30px;overflow:hidden;box-shadow:0 30px 72px -30px rgba(0,0,0,.22);\">\n\n    <!-- ================= ЦЕНЫ ================= -->\n    <sc-if value=\"{{ isPricing }}\" hint-placeholder-val=\"{{ false }}\">\n    <div>\n      <section style=\"max-width:1440px;margin:0 auto;padding:clamp(40px,6vw,84px) 32px clamp(48px,6vw,80px);\">\n        <div data-r=\"priceHero\" style=\"display:grid;grid-template-columns:1.1fr .9fr;gap:64px;align-items:center;\">\n          <div data-reveal=\"\" style=\"\">\n            <div style=\"font-size:13px;letter-spacing:.22em;text-transform:uppercase;color:#5F5F5F;font-weight:700;margin-bottom:24px;\">Цены<\u002Fdiv>\n            <h1 style=\"margin:0;font-size:clamp(32px,4.4vw,62px);line-height:1.05;letter-spacing:-0.025em;color:#2F2F2F;font-weight:700;text-wrap:balance;\">Стоимость зависит от задачи, сложности и состава команды<\u002Fh1>\n            <p style=\"margin:28px 0 0;font-size:18px;line-height:1.6;color:#2F2F2F;max-width:560px;\">Мы оцениваем проект по составу работ, уровню специалистов, срокам, интеграциям и требуемому результату<\u002Fp>\n          <\u002Fdiv>\n          <div data-reveal=\"\" style=\"background:#2F2F2F;border:1px solid #2F2F2F;border-radius:14px;padding:26px 28px;box-shadow:0 22px 50px -32px rgba(0,0,0,.5);align-self:center;justify-self:end;width:100%;max-width:340px;\">\n            <div style=\"font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.7);font-weight:700;\">Ставка специалиста<\u002Fdiv>\n            <div style=\"margin-top:10px;font-size:clamp(28px,3vw,40px);line-height:1;letter-spacing:-0.02em;color:#fff;font-weight:700;\">от 5 000 ₽<span style=\"font-size:.42em;color:rgba(255,255,255,.7);font-weight:700;\"> / час<\u002Fspan><\u002Fdiv>\n            <p style=\"margin:14px 0 0;font-size:14px;line-height:1.5;color:rgba(255,255,255,.7);\">Финальная стоимость складывается из состава команды и объёма работ по проекту<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <section style=\"border-top:1px solid #D0D0D0;background:#E6E6E6;\">\n        <div data-r=\"priceCalc\" style=\"max-width:1440px;margin:0 auto;padding:clamp(56px,7vw,96px) 32px;display:grid;grid-template-columns:1fr 1fr;gap:clamp(40px,5vw,72px);align-items:stretch;\">\n          <div data-reveal=\"\">\n            <h2 style=\"margin:0;font-size:clamp(26px,3vw,40px);letter-spacing:-0.02em;color:#2F2F2F;font-weight:700;\">От чего зависит цена<\u002Fh2>\n            <ul style=\"list-style:none;margin:clamp(28px,3vw,40px) 0 0;padding:0;display:flex;flex-direction:column;gap:18px;\">\n              <sc-for list=\"{{ priceFactors }}\" as=\"f\" hint-placeholder-count=\"9\">\n                <li style=\"display:flex;align-items:flex-start;gap:16px;font-size:18px;line-height:1.4;color:#2F2F2F;font-weight:700;\">\n                  <span style=\"width:8px;height:8px;border-radius:50%;background:#2F2F2F;flex:none;margin-top:8px;\"><\u002Fspan>\n                  <span>{{ f.label }}<\u002Fspan>\n                <\u002Fli>\n              <\u002Fsc-for>\n            <\u002Ful>\n          <\u002Fdiv>\n          <div data-reveal=\"\" style=\"display:flex;flex-direction:column;height:100%;\">\n            <div style=\"border:1px solid #D0D0D0;border-radius:18px;background:#fff;box-shadow:0 30px 70px -40px rgba(0,0,0,.3);overflow:hidden;display:flex;flex-direction:column;flex:1;\">\n            <div style=\"display:flex;align-items:center;gap:14px;padding:20px 26px;border-bottom:1px solid #D0D0D0;flex:none;\">\n              <div style=\"width:46px;height:46px;border-radius:12px;background:#2F2F2F;color:#fff;display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:700;flex:none;\">{{ agentInitial }}<\u002Fdiv>\n              <div style=\"line-height:1.25;\">\n                <div style=\"font-size:17px;font-weight:700;color:#2F2F2F;\">{{ agentName }}<\u002Fdiv>\n                <div style=\"font-size:13px;color:#5F5F5F;display:flex;align-items:center;gap:7px;\"><span style=\"width:7px;height:7px;border-radius:50%;background:#2F2F2F;display:inline-block;\"><\u002Fspan>ИИ-агент по расчёту стоимости<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <div ref=\"{{ chatBodyRef }}\" style=\"padding:28px 26px;flex:1;min-height:340px;overflow-y:auto;display:flex;flex-direction:column;gap:16px;background:#fff;\">\n              <sc-if value=\"{{ chatNotStarted }}\" hint-placeholder-val=\"{{ true }}\">\n                <div style=\"margin:auto;text-align:center;padding:30px 10px;\">\n                  <p style=\"margin:0 0 24px;font-size:16px;line-height:1.6;color:#5F5F5F;max-width:420px;\">Привет! Меня зовут {{ agentName }}. Я помогу посчитать ориентировочную стоимость вашего проекта и задам пару уточняющих вопросов<\u002Fp>\n                  <button onclick=\"{{ startChat }}\" style=\"font-family:inherit;cursor:pointer;background:#2F2F2F;color:#fff;border:none;border-radius:18px;padding:16px 32px;font-size:16px;font-weight:700;transition:all .3s cubic-bezier(.16,1,.3,1);\" style-hover=\"background:#2F2F2F;transform:translateY(-2px);box-shadow:0 12px 28px rgba(0,0,0,.2);\">Начать расчёт<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n\n              <sc-for list=\"{{ chatRender }}\" as=\"m\" hint-placeholder-count=\"0\">\n                <sc-if value=\"{{ m.isBot }}\" hint-placeholder-val=\"{{ true }}\">\n                  <div style=\"display:flex;gap:11px;align-items:flex-end;max-width:84%;animation:npp_msg .4s cubic-bezier(.16,1,.3,1) both;\">\n                    <div style=\"width:30px;height:30px;border-radius:9px;background:#2F2F2F;color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex:none;\">{{ agentInitial }}<\u002Fdiv>\n                    <div style=\"background:#E6E6E6;color:#2F2F2F;border-radius:4px 16px 16px 16px;padding:14px 18px;font-size:15.5px;line-height:1.55;white-space:pre-line;\">{{ m.text }}<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ m.isUser }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"align-self:flex-end;background:#2F2F2F;color:#fff;border-radius:16px 16px 4px 16px;padding:13px 18px;font-size:15.5px;line-height:1.5;max-width:80%;animation:npp_msg .4s cubic-bezier(.16,1,.3,1) both;\">{{ m.text }}<\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fsc-for>\n\n              <sc-if value=\"{{ chatTyping }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"display:flex;gap:11px;align-items:flex-end;\">\n                  <div style=\"width:30px;height:30px;border-radius:9px;background:#2F2F2F;color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex:none;\">{{ agentInitial }}<\u002Fdiv>\n                  <div style=\"background:#E6E6E6;border-radius:4px 16px 16px 16px;padding:16px 18px;display:flex;gap:5px;\">\n                    <span style=\"width:7px;height:7px;border-radius:50%;background:#5F5F5F;display:inline-block;animation:npp_typing 1.2s infinite;\"><\u002Fspan>\n                    <span style=\"width:7px;height:7px;border-radius:50%;background:#5F5F5F;display:inline-block;animation:npp_typing 1.2s infinite .2s;\"><\u002Fspan>\n                    <span style=\"width:7px;height:7px;border-radius:50%;background:#5F5F5F;display:inline-block;animation:npp_typing 1.2s infinite .4s;\"><\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n\n            <sc-if value=\"{{ hasChatOptions }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"padding:18px 26px;border-top:1px solid #D0D0D0;display:flex;flex-wrap:wrap;gap:10px;background:#E6E6E6;\">\n                <sc-for list=\"{{ chatOptions }}\" as=\"opt\" hint-placeholder-count=\"0\">\n                  <button onclick=\"{{ opt.onClick }}\" style=\"font-family:inherit;cursor:pointer;background:#fff;color:#2F2F2F;border:1px solid #D0D0D0;border-radius:18px;padding:11px 18px;font-size:14.5px;font-weight:700;transition:all .25s cubic-bezier(.16,1,.3,1);\" style-hover=\"background:#2F2F2F;color:#fff;border-color:#2F2F2F;transform:translateY(-2px);\">{{ opt.label }}<\u002Fbutton>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <\u002Fdiv>\n            <p style=\"margin:16px 0 0;font-size:13px;line-height:1.5;color:#5F5F5F;\">{{ agentName }} даёт только предварительную оценку — точную стоимость команда зафиксирует после обсуждения задачи<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ================= КЕЙСЫ ================= -->\n    <sc-if value=\"{{ isCases }}\" hint-placeholder-val=\"{{ false }}\">\n    <section style=\"max-width:1440px;margin:0 auto;padding:clamp(40px,6vw,84px) 32px clamp(64px,8vw,110px);\">\n      <div data-reveal=\"\" style=\"max-width:760px;margin-bottom:clamp(44px,5vw,68px);\">\n        <div style=\"font-size:13px;letter-spacing:.22em;text-transform:uppercase;color:#5F5F5F;font-weight:700;margin-bottom:22px;\">Портфолио<\u002Fdiv>\n        <h1 style=\"margin:0;font-size:clamp(36px,4.4vw,60px);line-height:1.04;letter-spacing:-0.025em;color:#2F2F2F;font-weight:700;text-wrap:balance;\">Реализованные проекты<\u002Fh1>\n        <p style=\"margin:24px 0 0;font-size:clamp(18px,2vw,21px);line-height:1.55;color:#2F2F2F;\">Каждый проект — это интеллектуальная система, созданная под конкретную задачу организации<\u002Fp>\n        <p style=\"margin:18px 0 0;font-size:16.5px;line-height:1.6;color:#5F5F5F;text-wrap:pretty;\">Показываем не технологии ради технологий, а результаты их применения: автоматизацию процессов, повышение эффективности, новые цифровые продукты и инструменты принятия решений<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"npp-cases-grid\" style=\"display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:clamp(28px,3vw,40px);\">\n        <sc-for list=\"{{ cases }}\" as=\"c\" hint-placeholder-count=\"9\">\n          <div onclick=\"{{ c.onOpen }}\" class=\"npp-case-card\" data-reveal=\"\" style=\"cursor:pointer;border:1px solid #D0D0D0;border-radius:18px;overflow:hidden;background:#fff;display:flex;flex-direction:column;box-shadow:0 1px 2px rgba(0,0,0,.04);transition:box-shadow .4s cubic-bezier(.16,1,.3,1),transform .4s cubic-bezier(.16,1,.3,1);\" style-hover=\"box-shadow:0 34px 64px -30px rgba(0,0,0,.34);transform:translateY(-7px);\">\n            <div style=\"background:#2F2F2F;padding:26px 26px 24px;display:flex;flex-direction:column;gap:16px;min-height:132px;\">\n              <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;\">\n                <span style=\"font-size:11.5px;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.55);font-weight:700;line-height:1.4;\">{{ c.category }}<\u002Fspan>\n                <span style=\"font-size:13px;font-weight:700;color:rgba(255,255,255,.4);flex:none;\">{{ c.no }}<\u002Fspan>\n              <\u002Fdiv>\n              <h3 style=\"margin:0;font-size:20px;line-height:1.26;letter-spacing:-0.015em;color:#fff;font-weight:700;text-wrap:balance;\">{{ c.title }}<\u002Fh3>\n            <\u002Fdiv>\n            <div style=\"padding:24px 26px 28px;display:flex;flex-direction:column;flex:1;\">\n              <p style=\"margin:0 0 20px;font-size:15.5px;line-height:1.55;color:#5F5F5F;\">{{ c.desc }}<\u002Fp>\n              <ul style=\"margin:auto 0 0;padding:0;list-style:none;display:flex;flex-direction:column;gap:10px;\">\n                <sc-for list=\"{{ c.effects }}\" as=\"e\" hint-placeholder-count=\"3\">\n                  <li style=\"display:flex;gap:11px;font-size:14px;line-height:1.4;color:#2F2F2F;align-items:flex-start;\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#2F2F2F\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex:none;margin-top:2px;\"><path d=\"M5 12.5l4.5 4.5L19 6.5\"><\u002Fpath><\u002Fsvg>{{ e }}<\u002Fli>\n                <\u002Fsc-for>\n              <\u002Ful>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsection>\n    <\u002Fsc-if>\n\n    <!-- ================= КЕЙС ================= -->\n    <sc-if value=\"{{ isCase }}\" hint-placeholder-val=\"{{ false }}\">\n    <article style=\"max-width:1080px;margin:0 auto;padding:clamp(32px,5vw,64px) 32px clamp(64px,8vw,110px);\">\n      <button onclick=\"{{ goCases }}\" data-reveal=\"\" style=\"font-family:inherit;cursor:pointer;background:none;border:none;color:#5F5F5F;font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px;padding:0;margin-bottom:clamp(32px,4vw,52px);transition:color .3s ease;\" style-hover=\"color:#2F2F2F;\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M19 12H5M11 6l-6 6 6 6\"><\u002Fpath><\u002Fsvg>Все кейсы<\u002Fbutton>\n\n      <!-- 7.1 HERO -->\n      <div data-r=\"caseHero\" data-reveal=\"\" style=\"display:grid;grid-template-columns:1.08fr .92fr;gap:clamp(36px,4vw,56px);align-items:center;margin-bottom:clamp(48px,6vw,80px);\">\n        <div>\n          <div style=\"font-size:13px;letter-spacing:.2em;text-transform:uppercase;color:#5F5F5F;font-weight:700;margin-bottom:20px;\">Кейс {{ currentCase.no }} · {{ currentCase.category }}<\u002Fdiv>\n          <h1 style=\"margin:0;font-size:clamp(30px,4vw,52px);line-height:1.07;letter-spacing:-0.025em;color:#2F2F2F;font-weight:700;text-wrap:balance;\">{{ currentCase.title }}<\u002Fh1>\n          <p style=\"margin:24px 0 0;font-size:18px;line-height:1.6;color:#2F2F2F;text-wrap:pretty;\">{{ currentCase.desc }}<\u002Fp>\n          <div style=\"margin-top:30px;\">\n            <div style=\"font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:#5F5F5F;font-weight:700;margin-bottom:14px;\">Главный эффект<\u002Fdiv>\n            <div style=\"display:flex;flex-wrap:wrap;gap:10px;\">\n              <sc-for list=\"{{ currentCase.effects }}\" as=\"e\" hint-placeholder-count=\"3\">\n                <span style=\"font-size:14px;font-weight:700;color:#2F2F2F;background:#fff;border:1px solid #D0D0D0;border-radius:999px;padding:9px 16px;\">{{ e }}<\u002Fspan>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <button onclick=\"{{ goFormFromCase }}\" style=\"font-family:inherit;cursor:pointer;margin-top:34px;background:#2F2F2F;color:#fff;border:none;border-radius:18px;padding:16px 32px;font-size:16px;font-weight:700;transition:all .3s cubic-bezier(.16,1,.3,1);\" style-hover=\"transform:translateY(-3px);box-shadow:0 16px 34px rgba(0,0,0,.25);\">Обсудить похожую задачу<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"height:clamp(400px,36vw,440px);border-radius:18px;overflow:hidden;\">\n          <div style=\"position:relative;width:100%;height:100%;background:#2F2F2F;overflow:hidden;font-family:'Manrope',-apple-system,sans-serif;\">\n            <div style=\"position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.05) 1px,transparent 1px);background-size:34px 34px;\"><\u002Fdiv>\n            <span style=\"position:absolute;top:18px;left:24px;z-index:5;font-size:12px;letter-spacing:.2em;text-trans аказа, часть заявок приходила неполной, а оферты отличались по структуре и качеству. Скорость подготовки зависела от опыта конкретного менеджера — у Б2Б-сервисной компании с повторяемыми типами заказов это ограничивало продажи.\\n\\nОбычный чат-бот задачу не решал: нельзя давать клиенту произвольные обещания, нужно соблюдать правила расчёта, обязательные параметры и сценарии передачи менеджеру. Бизнесу требовалось сократить ручной брифинг, унифицировать качество заявок и ускорить подготовку оферты без потери контроля.\",\"whatDid\":[\"Разложили процесс продаж на этапы: запрос, бриф, расчёт, оффер, передача\",\"Выделили обязательные параметры и условия, без которых расчёт запрещён\",\"Спроектировали диалоговую логику агента с уточняющими вопросами\",\"Подготовили системные инструкции, ограничения и правила тона\",\"Подключили расчётную логику и шаблон структуры коммерческого предложения\",\"Добавили подключение специалиста для нетипичных запросов и низкой уверенности\"],\"flow\":[\"Заявка\",\"Брифинг\",\"Проверка полноты\",\"Расчёт\",\"Оферта\",\"Менеджер / клиент\"],\"whyCool\":\"Ценность не в ответе модели, а в коммерческом контуре: агент собирает нужные данные, работает по правилам компании и отдаёт менеджеру структурированный результат.\",\"results\":[\"Быстрее первичная обработка заявки\",\"Меньше ручной работы менеджера\",\"Единая структура оферты\",\"Меньше потерь на неполных вводных\"],\"scale\":[\"ЦРМ и скоринг заявок\",\"Разные типы оферт\",\"Аналитика качества лидов\"]},{\"id\":\"support\",\"no\":\"02\",\"icon\":\"support\",\"category\":\"ИИ-поддержка в продукте\",\"title\":\"ИИ-агент поддержки внутри продукта\",\"desc\":\"Отвечает пользователям внутри продукта и передаёт сложные вопросы оператору.\",\"effects\":[\"Поддержка круглосуточно\",\"Меньше типовых обращений\",\"Быстрее ответы\"],\"task\":\"Пользователи не читают документацию заранее, операторы тратят время на повторяющиеся вопросы, а часть проблем возникает прямо внутри сценария продукта. У цифрового продукта с постоянным потоком типовых вопросов это создавало высокую нагрузку на поддержку.\\n\\nОтвечать нужно только в рамках проверенной базы знаний, учитывать контекст продукта и не придумывать несуществующие функции. Бизнесу требовалось сделать поддержку доступной внутри интерфейса, снизить поток типовых обращений и ускорить онбординг пользователей.\",\"whatDid\":[\"Собрали и структурировали базу знаний продукта\",\"Описали типовые вопросы и сценарии пользователя\",\"Настроили работу с базой знаний и ограничили ответы источниками\",\"Добавили контекст экрана и действия пользователя\",\"Описали правила эскалации оператору\",\"Заложили процесс обновления базы знаний после релизов\"],\"flow\":[\"Вопрос\",\"Поиск в БЗ\",\"Учёт контекста\",\"Ответ\",\"Эскалация\"],\"whyCool\":\"Это не чат на сайте, а встроенный слой поддержки продукта: он связан с документацией, релизами, контекстом экрана и правилами эскалации.\",\"results\":[\"Поддержка доступна 24/7\",\"Меньше типовых обращений\",\"Быстрее ответы пользователям\",\"База знаний работает в продукте\"],\"scale\":[\"Контроль качества ответов\",\"Автообновление базы знаний\",\"Аналитика повторяющихся проблем\",\"Омниканальность\"]},{\"id\":\"devflow\",\"no\":\"03\",\"icon\":\"pipeline\",\"category\":\"ИИ-процесс · разработка\",\"title\":\"Автоматизированный канбан с ИИ-агентами\",\"desc\":\"Ведёт задачу от идеи до постановки: требования, декомпозиция и критерии приёмки.\",\"effects\":[\"Быстрее путь к задаче\",\"Меньше потери контекста\",\"Чёткая очередь задач\"],\"task\":\"Идеи приходили в разном формате, требования приходилось вручную структурировать, девелоперы получали неполный контекст, а часть времени уходила на переписывание задач. В продуктовой команде скорость разработки ограничивалась ручной постановкой задач и потерей контекста между ролями.\\n\\nИИ не должен сам принимать продуктовые решения: финальный приоритет, скоуп и релизный план остаются за Product Owner. Бизнесу требовалось ускорить подготовку задач и снизить управленческую рутину без просадки качества требований.\",\"whatDid\":[\"Описали канбан-процесс и роли команды\",\"Разделили ИИ-агентов по ролям: аналитик, редактор требований, тестировщик, техписатель\",\"Настроили шаблоны: пользовательский сценарий, критерии приёмки, нетиповые сценарии и их тесты\",\"Добавили проверку полноты задачи до передачи в разработку\",\"Связали ИИ-процесс с бэклогом и трекером задач\",\"Оставили обязательную продуктовую валидацию перед запуском в работу\"],\"flow\":[\"Идея\",\"ИИ-анализ\",\"Пользовательский сценарий\",\"Критерии приёмки / тест-кейсы\",\"Канбан\",\"Разработка\"],\"whyCool\":\"ИИ работает не как генератор текста, а как участник продуктового процесса с ролями, артефактами, проверками и границами ответственности.\",\"results\":[\"Быстрее переход от идеи к задаче\",\"Меньше потери контекста\",\"Лучше структура бэклога\",\"Выше качество входа в разработку\"],\"scale\":[\"Интеграция с Jira / YouTrack\",\"Автогенерация релиз-нот\",\"Чек-лист проверки\",\"Оценка готовности фичи\"]},{\"id\":\"expert\",\"no\":\"04\",\"icon\":\"network\",\"category\":\"ИИ-оценка · экспертиза\",\"title\":\"Сеть ИИ-агентов для экспертной оценки контента\",\"desc\":\"Распределяет проверку материалов между агентами и выделяет спорные места.\",\"effects\":[\"Быстрее обработка массива\",\"Единые критерии\",\"Спорные места — отдельно\"],\"task\":\"Материалов для проверки много, оценка зависит от конкретного эксперта, единые критерии держать трудно, а спорные случаи теряются в общем потоке. В организации с большим объёмом конкурсных, образовательных или экспертных материалов ручная проверка ограничивала скорость.\\n\\nПолностью заменять эксперта нельзя: нужна единая шкала, прозрачность аргументации и ручная валидация спорных случаев. Бизнесу требовалось ускорить первичный анализ, снизить нагрузку на экспертов и повысить воспроизводимость оценки.\",\"whatDid\":[\"Формализовали критерии и шкалы оценки\",\"Разделили проверку на роли: первичный, критический, балансирующий агент\",\"Настроили многораундовое обсуждение и сверку выводов\",\"Добавили модель-судью для агрегирования аргументов\",\"Сформировали отчёт с обоснованием и спорными зонами\",\"Оставили финальное решение за экспертом\"],\"flow\":[\"Материалы\",\"Агенты по ролям\",\"Сверка\",\"Спорные места\",\"Отчёт\",\"Эксперт\"],\"whyCool\":\"Один агент часто даёт плоскую оценку. Сеть агентов даёт управляемую экспертизу: разные роли, аргументы, верификация и человеческое финальное решение.\",\"results\":[\"Быстрее обработка массива материалов\",\"Единые критерии оценки\",\"Эксперт работает с выводами\",\"Проще выявлять спорные места\"],\"scale\":[\"Новые критерии\",\"Аудит оценок\",\"Отчётность для комиссий\",\"Интеграция с системами обучения и ЦРМ\"]},{\"id\":\"uxflow\",\"no\":\"05\",\"icon\":\"screen\",\"category\":\"ИИ-процесс · интерфейсы\",\"title\":\"Процесс изменения дизайна и интерфейса продукта с системой ИИ-агентов\",\"desc\":\"ИИ встроен в пользовательский интерфейс: помогает анализировать текущие экраны, находить проблемы, формировать гипотезы и собирать структуру будущих интерфейсов.\",\"effects\":[\"Быстрее редизайн\",\"Меньше хаотичных правок\",\"Лучше описаны сценарии\"],\"task\":\"Правки были разрозненными, сложно отделить вкус от проблемы в пользовательском интерфейсе, часть логики интерфейса не описана, а команде не хватало единой картины продукта. У сотрудников с накопленным интерфейсным долгом и большим количеством несистемных правок это тормозило развитие.\\n\\nИИ не должен заменять дизайнера — он используется для анализа, структурирования и ускорения, финальные решения принимает команда. Бизнесу требовалось перевести редизайн из субъективных правок в управляемый процесс с понятными гипотезами.\",\"whatDid\":[\"Собрали текущие экраны и пользовательские сценарии\",\"Разметили проблемы и места трения\",\"Настроили ИИ-анализ структуры экранов\",\"Сгенерировали гипотезы улучшений и состояния интерфейса\",\"Подготовили структуру новых экранов и тексты\",\"Передали дизайнеру и продуктовой команде для финального решения\"],\"flow\":[\"Экран\",\"Сценарий\",\"Анализ\",\"Гипотезы\",\"Структура\",\"Дизайн-решение\"],\"whyCool\":\"ИИ не рисует случайные красивые экраны. Он помогает продуктовой команде быстрее пройти путь от проблемы к решению и сохранить связь дизайна с бизнес-целью.\",\"results\":[\"Быстрее подготовка редизайна\",\"Меньше хаотичных правок\",\"Лучше описаны сценарии\",\"Команда быстрее принимает решения\"],\"scale\":[\"Дизайн-система\",\"Аудит всего продукта\",\"Генерация микротекстов\",\"Проверка консистентности экранов\"]},{\"id\":\"embed\",\"no\":\"06\",\"icon\":\"stage\",\"category\":\"ИИ в подборе персонала\",\"title\":\"ИИ внутри ЭйчАр (HR)-процесса: генерация дерева сценариев\",\"desc\":\"ИИ-модуль принимает описание задачи и превращает его в структурированное дерево сценария: вопросы, развилки, ответы и итоговые состояния.\",\"effects\":[\"Быстрее создание сценариев\",\"Меньше ручной сборки\",\"Структурированный результат\"],\"task\":\"Пользователям сложно проектировать сценарии с нуля, ручная сборка дерева занимает время, ошибки в логике ветвления ломают сценарий, а нужен структурированный результат, а не просто текст. В ЭйчАр (HR) / рекрутинговом продукте пользователям нужно быстро собирать сценарии коммуникации с кандидатами.\\n\\nНужно получать не текстовый совет, а валидную структуру, которую продукт может сохранить, отобразить и запустить. Бизнесу требовалось упростить создание сценариев без ручной сборки каждого узла и ускорить запуск новых ЭйчАр (HR)-процессов.\",\"whatDid\":[\"Описали модель сценария: узлы, связи, условия, типы вопросов\",\"Настроили преобразование текста задачи в структурированные данные\",\"Добавили правила валидации дерева и обязательных полей\",\"Подготовили сценарии уточнения, если входных данных недостаточно\",\"Связали результат с интерфейсом конструктора\",\"Оставили ручное редактирование и контроль пользователя\"],\"flow\":[\"Описание задачи\",\"ИИ-структурирование\",\"Структурированные данные\",\"Валидация\",\"Конструктор\",\"Запуск\"],\"whyCool\":\"ИИ встроен в конкретный бизнес-этап. Он не отвечает пользователю в чате, а создаёт артефакт, который становится частью продукта.\",\"results\":[\"Быстрее создание сценариев\",\"Меньше ручной сборки\",\"Структурированный результат\",\"Проще масштабировать на новые процессы\"],\"scale\":[\"Ветвления и скоринг\",\"Шаблоны под роли\",\"Автотест сценариев\",\"Аналитика прохождения\"]},{\"id\":\"analytics\",\"no\":\"07\",\"icon\":\"analytics\",\"category\":\"ИИ-аналитика · рекомендации\",\"title\":\"ИИ-агент внутри аналитики продукта\",\"desc\":\"Находит отклонения в показателях, объясняет причины и предлагает решения.\",\"effects\":[\"Быстрее анализ показателей\",\"Раньше видны проблемы\",\"Понятные рекомендации\"],\"task\":\"Дашборды показывают цифры, но не объясняют действия, аномалии замечаются поздно, аналитическая рутина отнимает время, а команде нужны гипотезы, а не только графики. У продуктовой команды с дашбордами не было постоянного ресурса на ежедневную интерпретацию метрик.\\n\\nИИ не должен делать необоснованные причинно-следственные выводы — рекомендации должны быть гипотезами, а не «истиной». Бизнесу требовалось перейти от пассивных дашбордов к аналитике, которая помогает команде принимать решения.\",\"whatDid\":[\"Определили ключевые метрики и допустимые отклонения\",\"Описали типовые сигналы: падение конверсии, рост отказов, провалы воронки\",\"Настроили анализ динамики и сравнение периодов\",\"Добавили объяснение возможных причин с уровнем уверенности\",\"Сформировали формат рекомендаций и next steps\",\"Запретили категоричные выводы без подтверждающих данных\"],\"flow\":[\"Метрики\",\"Динамика\",\"Аномалии\",\"Возможные причины\",\"Рекомендации\",\"Решение команды\"],\"whyCool\":\"Дашборд отвечает «что произошло». ИИ-аналитик помогает сформулировать «почему это могло произойти» и «что проверить дальше».\",\"results\":[\"Быстрее анализ метрик\",\"Раньше замечаются проблемы\",\"Меньше ручной рутины\",\"Рекомендации ближе к действиям\"],\"scale\":[\"Событийная аналитика\",\"A/B-гипотезы\",\"Алерты\",\"Автоматические продуктовые отчёты\"]},{\"id\":\"lore\",\"no\":\"08\",\"icon\":\"lore\",\"category\":\"ИИ для медиапроекта\",\"title\":\"ИИ-система для добавления человека в медиафраншизу\",\"desc\":\"Встраивает нового персонажа во вселенную с учётом канонов и стиля мира.\",\"effects\":[\"Быстрее создание персонажей\",\"Меньше противоречий\",\"Сохранение стилистики\"],\"task\":\"Материалов по вселенной много, новые персонажи могут конфликтовать с лором, держать стиль и ограничения трудно, а креативный процесс плохо масштабируется. У креативной команды медиафраншизы — большой объём лора, персонажей, визуальных правил и сюжетных ограничений.\\n\\nНельзя ломать правила мира, визуальную стилистику и характер существующей вселенной — нужен контролируемый креатив. Бизнесу требовалось ускорить создание персонажа и снизить риск противоречий в лоре и визуальной системе.\",\"whatDid\":[\"Собрали материалы по миру, персонажам, географии и правилам\",\"Структурировали лор в базу знаний\",\"Выделили визуальные и смысловые ограничения\",\"Настроили проверку соответствия нового образа миру\",\"Добавили генерацию описания, роли, мотивации и связей\",\"Сформировали пакет материалов для креативной команды\"],\"flow\":[\"Описание человека\",\"Правила мира\",\"Адаптация\",\"Проверка противоречий\",\"Образ\",\"Материалы\"],\"whyCool\":\"ИИ используется не для случайной генерации, а как контролёр целостности франшизы и ускоритель работы с большим объёмом лора.\",\"results\":[\"Быстрее создание персонажей\",\"Меньше противоречий\",\"Сохранение стилистики мира\",\"Проще масштабировать франшизу\"],\"scale\":[\"Библия вселенной\",\"Генератор квестов\",\"Контроль канона\",\"Пайплайн визуальных концептов\"]},{\"id\":\"gamedev\",\"no\":\"09\",\"icon\":\"gamedev\",\"category\":\"ИИ в разработке игр\",\"title\":\"ИИ в разработке игр\",\"desc\":\"Помогает на подготовительном этапе игры: лор, персонажи, фракции, сценарии и визуальные концепции.\",\"effects\":[\"Быстрее подготовительный этап\",\"Качественные варианты\",\"Лучше структурирован лор\"],\"task\":\"Много типов контента — лор, квесты, персонажи, предметы, — легко потерять единый стиль, материалы нужны разным ролям команды, а ручная подготовка замедляет старт производства. Команде геймдев-проекта нужно быстро подготовить большой объём согласованных материалов.\\n\\nИИ не должен заменять геймдизайн и арт-дирекшн — все материалы проходят редактуру и проверку соответствия миру. Бизнесу требовалось ускорить подготовительный этап и снизить хаос в материалах без потери целостности игрового мира.\",\"whatDid\":[\"Описали производственный пайплайн игры\",\"Структурировали базу мира, фракций и персонажей\",\"Настроили генерацию вариантов с проверкой канона\",\"Подготовили базу знаний для квестов, предметов и локаций\",\"Добавили редакторскую проверку и финальное утверждение\",\"Собрали материалы в формат, понятный команде разработки\"],\"flow\":[\"Направление\",\"Варианты\",\"Проверка мира\",\"Редактура\",\"Производственный пакет\"],\"whyCool\":\"ИИ работает как производственный ускоритель, а не как автор «рандомного фэнтези». Главная ценность — связность мира и управляемость контента.\",\"results\":[\"Быстрее подготовительный этап\",\"Больше качественных вариантов\",\"Лучше структурирован лор\",\"Команда быстрее переходит к производству\"],\"scale\":[\"Квестовые цепочки\",\"Персонажи и предметы\",\"Балансные описания\",\"Сезонный ивент контент\"]},{\"id\":\"markup\",\"no\":\"10\",\"icon\":\"network\",\"category\":\"Обучение · разметка\",\"title\":\"ИИ-разметка образовательного контента по компетенциям\",\"desc\":\"Определяет компетенции занятия по описанию и многоуровневой модели.\",\"effects\":[\"Разметка как конвейер\",\"Методист проверяет\",\"Масштаб каталога\"],\"task\":\"Методисты обрабатывали около 100 записей в месяц, ручная разметка плохо масштабировалась, краудсорсинг дал недостаточное качество, а ошибка в компетенции ломает дальнейшие рекомендации. В образовательном продукте ручная разметка активностей ограничивала масштабирование каталога.\\n\\nКраудсорсинг показал низкое качество, полностью убрать методиста нельзя — нужен реальный человек для понятной логики проверки. Бизнесу требовалось ускорить разметку образовательного контента и сохранить методическое качество.\",\"whatDid\":[\"Проанализировали методическую модель компетенций\",\"Структурировали справочник примерно из 300 компетенций\",\"Подготовили формат входного описания активности\",\"Настроили классификацию языковой модели с обоснованием выбора\",\"Добавили валидацию методистом и обратную связь\",\"Заложили накопление проверенных примеров для повышения качества\"],\"flow\":[\"Описание активности\",\"Классификация языковой модели\",\"Компетенции\",\"Обоснование\",\"Методист\",\"База\"],\"whyCool\":\"Это не генерация тегов на глаз. Модель работает с методической иерархией, объясняет выбор и проходит экспертную валидацию.\",\"results\":[\"Разметка стала конвейером\",\"Методист проверяет, а не делает всё с нуля\",\"Повышается масштабируемость каталога\",\"Появляется база для рекомендаций\"],\"scale\":[\"Самообучение на новых данных\",\"Дообучение на проверенных примерах\",\"Автоприоритизация спорных разметок\"]},{\"id\":\"openanswers\",\"no\":\"11\",\"icon\":\"analytics\",\"category\":\"Обучение · оценка ответов\",\"title\":\"ИИ-оценка открытых ответов по методической шкале\",\"desc\":\"Оценивает открытые ответы детей по инструкции методистов и единой шкале.\",\"effects\":[\"Меньше ручной проверки\",\"Единая шкала\",\"Спорные ответы — отдельно\"],\"task\":\"Закрытые тесты не покрывают творческие задания, ручная проверка занимает время, разные проверяющие могут оценивать по-разному, а нужна шкала, а не свободное мнение модели. В образовательном продукте часть заданий невозможно проверить через заранее заданный вариант ответа.\\n\\nОтветы детей вариативны (!sc) return;\n    this.setState({agi:i, agVis:0, agThinking:true, agAnswer:false, agResult:false});\n    let d = 750;\n    sc.steps.forEach((_, idx) => { this.agLater(()=>this.setState({agVis: idx+1}), d); d += 760; });\n    this.agLater(()=>this.setState({agThinking:false, agAnswer:true}), d + 150);\n    this.agLater(()=>this.setState({agResult:true}), d + 650);\n    this.agLater(()=>this.runScenario((i+1) % this.agentScenarios.length), d + 3400);\n  }\n  componentDidUpdate(prevProps, prevState){\n    if(!prevState) return;\n    if(prevState.page !== this.state.page){\n      if(typeof window !== 'undefined') window.scrollTo({top:0});\n      this.handleScroll();\n      setTimeout(()=>this.checkReveal(), 400);\n      setTimeout(()=>this.checkReveal(), 900);\n    }\n    if(prevState.chatMsgs !== this.state.chatMsgs || prevState.chatTyping !== this.state.chatTyping){\n      const b = this.chatBodyRef.current;\n      if(b) requestAnimationFrame(()=>{ b.scrollTop = b.scrollHeight; });\n    }\n  }\n  componentWillUnmount(){\n    window.removeEventListener('scroll', this.onScroll);\n    window.removeEventListener('resize', this.onScroll);\n    clearTimeout(this._safety); clearTimeout(this._botT); clearInterval(this._force);\n    (this._agTimers||[]).forEach(clearTimeout);\n  }\n\n  handleScroll(){\n    const sticky = this.props.stickyHeader ?? true;\n    const y = (typeof window!=='undefined') ? window.scrollY : 0;\n    const small = sticky && y > 36;\n    if(small !== this.state.scrolled) this.setState({scrolled: small});\n    this.checkReveal();\n  }\n\n  checkReveal(){\n    if(typeof window==='undefined') return;\n    const on = this.props.revealAnimations ?? true;\n    if(!on){ this.revealAll(); return; }\n    const vh = window.innerHeight || 800;\n    document.querySelectorAll('[data-reveal]').forEach(e=>{\n      if(e.hasAttribute('data-shown')) return;\n      const r = e.getBoundingClientRect();\n      if(r.top < vh * 0.92 && r.bottom > -40){ e.setAttribute('data-shown',''); e.dataset.shownAt = String(Date.now()); }\n    });\n  }\n  forceCheck(){\n    if(typeof document==='undefined') return;\n    const now = Date.now();\n    document.querySelectorAll('[data-reveal][data-shown]').forEach(e=>{\n      if(e.hasAttribute('data-force')) return;\n      const t = parseInt(e.dataset.shownAt || '0', 10);\n      if(now - t > 1200 && parseFloat(getComputedStyle(e).opacity) < 0.9) e.setAttribute('data-force','');\n    });\n  }\n  revealAll(){ if(typeof document==='undefined') return; document.querySelectorAll('[data-reveal]').forEach(e=>{ if(!e.hasAttribute('data-shown')){ e.setAttribute('data-shown',''); e.dataset.shownAt = String(Date.now()); } }); }\n\n  navTo = (page, caseId=null) => {\n    this.setState({page, caseId});\n    if(typeof window!=='undefined') window.scrollTo({top:0});\n    [50,300,700,1300].forEach(d=> setTimeout(()=>{ this.handleScroll(); this.checkReveal(); }, d));\n  };\n  scrollToForm = () => {\n    setTimeout(()=>{ const f = document.getElementById('lead-form'); if(f){ const top = f.getBoundingClientRect().top + window.scrollY - 90; window.scrollTo({top, behavior:'smooth'}); } }, 90);\n  };\n\n  // chat logic\n  botSay(text, options){\n    this.setState({chatTyping:true, chatOptions:[]});\n    clearTimeout(this._botT);\n    this._botT = setTimeout(()=>{\n      this.setState(s=>({chatTyping:false, chatMsgs:[...s.chatMsgs, {from:'bot', text}], chatOptions:options||[]}));\n    }, 750);\n  }\n  startChat = () => {\n    const name = this.props.chatAgentName || 'Дмитрий';\n    this.setState({chatStarted:true, chatMsgs:[{from:'bot', text:'Привет, меня зовут '+name+'. Я помогу посчитать ориентировочную стоимость вашего проекта. Если что-то будет непонятно, я задам уточняющий вопрос.'}], chatOptions:[], picks:{}});\n    setTimeout(()=> this.askStep(0), 650);\n  };\n  askStep(i){ const st = this.steps[i]; this.botSay(st.q, st.options.map(o=>({...o, step:i}))); }\n  pickOption = (opt) => {\n    if(opt.action === 'contact'){\n      this.setState(s=>({chatMsgs:[...s.chatMsgs, {from:'user', text:opt.label}], chatOptions:[]}));\n      this.navTo('home'); this.scrollToForm(); return;\n    }\n    if(opt.action === 'restart'){\n      this.setState({chatStarted:false, chatMsgs:[], chatOptions:[], picks:{}});\n      setTimeout(()=> this.startChat(), 60); return;\n    }\n    const key = this.steps[opt.step].key;\n    this.setState(s=>({chatMsgs:[...s.chatMsgs, {from:'user', text:opt.label}], chatOptions:[], picks:{...s.picks, [key]:opt.v}}));\n    const next = opt.step + 1;\n    if(next < this.steps.length){ setTimeout(()=> this.askStep(next), 380); }\n    else { setTimeout(()=> this.finishChat({...this.state.picks, [key]:opt.v}), 420); }\n  };\n  estimate(p){\n    const base = {agent:[500,1500], embed:[800,2500], product:[1500,5000], staff:[400,1200]}[p.type] || [800,2500];\n    let m = 1;\n    if(p.team==='std') m*=1.4; if(p.team==='max') m*=2;\n    if(p.integ==='crm') m*=1.3; if(p.integ==='kb') m*=1.25; if(p.integ==='api') m*=1.2;\n    if(p.timeline==='rush') m*=1.3;\n    const round = n => Math.round(n*m/50)*50;\n    const lo = round(base[0]), hi = round(base[1]);\n    const fmt = n => n >= 1000 ? (n/1000).toLocaleString('ru-RU',{maximumFractionDigits:1}) + ' млн ₽' : n + ' тыс ₽';\n    const tier = {agent:'ИИ-агент', embed:'внедрение ИИ в процессы', product:'цифровой продукт под ключ', staff:'ИИ-аутстафф'}[p.type] || 'ИИ-проект';\n    const weeks = {rush:'до 4 недель', mid:'6–12 недель', long:'3–6 месяцев', unknown:'уточним на созвоне'}[p.timeline] || '6–12 недель';\n    return {range:'от '+fmt(lo)+' до '+fmt(hi), tier, weeks};\n  }\n  finishChat(picks){\n    const e = this.estimate(picks);\n    const text = 'Спасибо! По описанию это похоже на проект уровня «'+e.tier+'».\\n\\nПредварительная вилка: '+e.range+'.\\nОриентир по срокам: '+e.weeks+'.\\n\\nЭто только предварительная оценка — точные цифры зафиксируем после короткого созвона с командой.';\n    this.botSay(text, [ {label:'Связаться с командой', action:'contact'}, {label:'Посчитать заново', action:'restart'} ]);\n  }\n\n  submitForm = (e) => { if(e && e.preventDefault) e.preventDefault(); const f = e && e.target; this.setState({formSent:true}); if(f && f.reset) f.reset(); };\n  closeModal = () => this.setState({formSent:false});\n  stopProp = (e) => { if(e && e.stopPropagation) e.stopPropagation(); };\n\n  initCookies(){\n    if(typeof window==='undefined') return;\n    let saved=null;\n    try{ saved = JSON.parse(localStorage.getItem('npp_cookie_consent')||'null'); }catch(e){}\n    if(saved && typeof saved==='object'){\n      this.setState({cookieDecided:true, cookieFunctional:!!saved.functional, cookieAnalytics:!!saved.analytics});\n    } else {\n      this.setState({cookieDecided:false});\n    }\n  }\n  persistCookies(functional, analytics){\n    if(typeof window==='undefined') return;\n    const val = {essential:true, functional, analytics, ts:Date.now()};\n    try{ localStorage.setItem('npp_cookie_consent', JSON.stringify(val)); }catch(e){}\n    try{ document.cookie = 'npp_cookie_consent=1;max-age=31536000;path=/;samesite=lax'; }catch(e){}\n  }\n  acceptAllCookies = () => { this.persistCookies(true,true); this.setState({cookieFunctional:true, cookieAnalytics:true, cookieDecided:true, cookieSettingsOpen:false}); };\n  rejectCookies = () => { this.persistCookies(false,false); this.setState({cookieFunctional:false, cookieAnalytics:false, cookieDecided:true, cookieSettingsOpen:false}); };\n  saveCookieSettings = () => { this.persistCookies(this.state.cookieFunctional, this.state.cookieAnalytics); this.setState({cookieDecided:true, cookieSettingsOpen:false}); };\n  openCookieSettings = () => this.setState({cookieSettingsOpen:true});\n  closeCookieSettings = () => this.setState({cookieSettingsOpen:false});\n  reopenCookieBanner = () => this.setState({cookieDecided:false, cookieSettingsOpen:true});\n  toggleCookieFunctional = () => this.setState(s=>({cookieFunctional:!s.cookieFunctional}));\n  toggleCookieAnalytics = () => this.setState(s=>({cookieAnalytics:!s.cookieAnalytics}));\n\n  renderVals(){\n    const page = this.state.page;\n    const agentName = this.props.chatAgentName || 'Дмитрий';\n    const cases = this.casesData.map(c => ({...c, onOpen: () => this.navTo('case', c.id)}));\n    const ccRaw = this.casesData.find(c => c.id === this.state.caseId) || this.casesData[0];\n    const currentCase = {...ccRaw,\n      taskParas: (ccRaw.task||'').split('\\n\\n').filter(x=>x),\n      whatDidN: (ccRaw.whatDid||[]).map((t,i)=>({n:String(i+1).padStart(2,'0'), text:t})),\n      flowN: (ccRaw.flow||[]).map((label,i)=>({label, notFirst: i>0}))\n    };\n    // CaseArt visualization (inlined — no child fetch, bundles offline)\n    const caFlow = (Array.isArray(ccRaw.flow) && ccRaw.flow.length) ? ccRaw.flow : ['Вход','Обработка','Проверка','Решение','Результат'];\n    const caResults = (Array.isArray(ccRaw.results) && ccRaw.results.length) ? ccRaw.results : ['Готово'];\n    const caStep = 0.72, caTail = 2.2;\n    const caCycle = (caFlow.length + caTail) * caStep;\n    const caseArtNodes = caFlow.map((label,i)=>({ label, notFirst:i>0, delayS:(i*caStep).toFixed(2) }));\n    const caseArtCycleS = caCycle.toFixed(2);\n    const caseArtResultDelayS = (caFlow.length*caStep).toFixed(2);\n    const caseArtResultText = caResults[0];\n    const caseArtNo = ccRaw.no || '01';\n    const legalDocs = (typeof window!=='undefined' && window.NPP_LEGAL) ? window.NPP_LEGAL : {};\n    const legalKey = legalDocs[page] ? page : null;\n    const legalRaw = legalKey ? legalDocs[legalKey] : null;\n    const legal = legalRaw ? {\n      eyebrow: legalRaw.subtitle || 'Правовая информация',\n      title: legalRaw.title,\n      sections: (legalRaw.sections||[]).map(s => ({ hasHeading: !!s.heading, heading: s.heading||'', body: (s.paras||[]).join('\\n\\n') }))\n    } : {eyebrow:'', title:'', sections:[]};\n    const chatRender = this.state.chatMsgs.map(m => ({...m, isBot: m.from==='bot', isUser: m.from==='user'}));\n    const chatOptions = this.state.chatOptions.map(o => ({...o, onClick: () => this.pickOption(o)}));\n    const sc = this.state.scrolled;\n\n    const agi = this.state.agi ?? 0;\n    const agScene = this.agentScenarios[agi] || this.agentScenarios[0];\n    const agVis = this.state.agVis ?? 0;\n    const agSteps = agScene.steps.slice(0, agVis);\n    const agResult = this.state.agResult ?? false;\n    const inboxItems = this.agentScenarios.map((s, idx) => {\n      const on = idx === agi;\n      return { label:s.inboxLabel, time:s.inboxTime, on, off: !on,\n        isMail:s.icon==='mail', isPhone:s.icon==='phone', isChat:s.icon==='chat' };\n    });\n\n    return {\n      inboxItems,\n      agClientMsg: agScene.client,\n      agSteps,\n      agThinking: this.state.agThinking ?? false,\n      agShowAnswer: this.state.agAnswer ?? false,\n      agAnswer: agScene.answer,\n      agStatus: agResult ? 'Закрыто автоматически' : 'Агент обрабатывает',\n      agResult, agProcessing: !agResult,\n      agRoute: agScene.route, agCsat: agScene.csat, agEsc: agScene.esc, agTime: agScene.time,\n      hPad: sc ? '14px clamp(28px,4vw,64px)' : '34px clamp(28px,4vw,64px)',\n      hLogo: sc ? '44px' : '54px', hBrand: sc ? '20px' : '24px',\n      hTagMax: sc ? '0px' : '26px', hTagOp: sc ? '0' : '1', hTagMt: sc ? '0px' : '5px',\n      hShadow: sc ? '0 8px 28px -14px rgba(0,0,0,.22)' : 'none',\n      isHome: page==='home', isPricing: page==='pricing', isCases: page==='cases', isCase: page==='case',\n      isLegal: legalKey != null,\n      goHome: () => this.navTo('home'),\n      goPricing: () => this.navTo('pricing'),\n      goCases: () => this.navTo('cases'),\n      goPolicy: () => this.navTo('policy'),\n      goTerms: () => this.navTo('terms'),\n      goContacts: () => this.navTo('requisites'),\n      goConsent: () => this.navTo('consent'),\n      goCookie: () => this.navTo('cookie'),\n      goInfosec: () => this.navTo('infosec'),\n      goAnticorr: () => this.navTo('anticorr'),\n      goItInfo: () => this.navTo('itinfo'),\n      goRequisites: () => this.navTo('requisites'),\n      goForm: () => { if(this.state.page!=='home'){ this.navTo('home'); } this.scrollToForm(); },\n      goFormFromCase: () => { this.navTo('home'); this.scrollToForm(); },\n      heroPoints: ['Опыт 6+ лет','Без джунов','Под результат','ИИ внутри процессов','Проекты под ключ'],\n      showSecondaryCta: this.props.showSecondaryCta ?? true,\n      cases, currentCase,\n      caseArtNo, caseArtNodes, caseArtCycleS, caseArtResultDelayS, caseArtResultText,\n      priceFactors: this.priceFactorsData,\n      submitForm: this.submitForm, formSent: this.state.formSent, formNotSent: !this.state.formSent,\n      closeModal: this.closeModal, stopProp: this.stopProp,\n      notHome: this.state.page !== 'home',\n      cookieUndecided: !this.state.cookieDecided,\n      cookieSettingsOpen: this.state.cookieSettingsOpen,\n      cookieFunctional: this.state.cookieFunctional, cookieFunctionalOff: !this.state.cookieFunctional,\n      cookieAnalytics: this.state.cookieAnalytics, cookieAnalyticsOff: !this.state.cookieAnalytics,\n      cookieBannerText: (typeof window!=='undefined' && window.NPP_COOKIES) ? window.NPP_COOKIES.bannerText : '',\n      acceptAllCookies: this.acceptAllCookies, rejectCookies: this.rejectCookies,\n      saveCookieSettings: this.saveCookieSettings, openCookieSettings: this.openCookieSettings,\n      closeCookieSettings: this.closeCookieSettings, reopenCookieBanner: this.reopenCookieBanner,\n      toggleCookieFunctional: this.toggleCookieFunctional, toggleCookieAnalytics: this.toggleCookieAnalytics,\n      startChat: this.startChat,\n      agentName, agentInitial: agentName.charAt(0),\n      chatNotStarted: !this.state.chatStarted,\n      chatRender, chatOptions, hasChatOptions: chatOptions.length > 0, chatTyping: this.state.chatTyping,\n      legalEyebrow: legal.eyebrow, legalTitle: legal.title, legalSections: legal.sections,\n      year: new Date().getFullYear(),\n      headerRef: this.headerRef, innerRef: this.innerRef, logoRef: this.logoRef,\n      brandNameRef: this.brandNameRef, taglineRef: this.taglineRef, chatBodyRef: this.chatBodyRef\n    };\n  }\n}\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"},"entry":"Нейро Про Плюс.dc"}

  <!-- Отправка заявки с формы на relay (Cloudflare Worker → Telegram) -->
  <script>
  (function () {
    var RELAY = 'https://neuropro-lead-relay.rachikdarustill.workers.dev';
    function keyFor(inp) {
      if (inp.type === 'email') return 'email';
      if (inp.type === 'tel') return 'phone';
      var p = (inp.placeholder || '').toLowerCase();
      if (p.indexOf('@') > -1) return 'email';
      if (p.indexOf('+7') > -1 || p.indexOf('телефон') > -1) return 'phone';
      if (p.indexOf('обращ') > -1 || p.indexOf('имя') > -1) return 'name';
      if (p.indexOf('назван') > -1 || p.indexOf('компан') > -1) return 'company';
      return null;
    }
    // capture-фаза: читаем значения до того, как форма сделает reset()
    document.addEventListener('submit', function (e) {
      var form = e.target;
      if (!form || form.tagName !== 'FORM') return;
      var isLead = form.classList.contains('npp-darkform') ||
        (form.closest && form.closest('#lead-form'));
      if (!isLead) return;
      var data = {};
      form.querySelectorAll('input').forEach(function (inp) {
        if (inp.type === 'checkbox' || inp.type === 'hidden') return;
        var k = keyFor(inp);
        if (k && inp.value.trim()) data[k] = inp.value.trim();
      });
      var hp = form.querySelector('input[name="website"], input[name="_gotcha"]');
      if (hp) data.website = hp.value;
      try {
        fetch(RELAY, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data),
          keepalive: true
        }).catch(function () {});
      } catch (_) {}
    }, true);
  })();
  </script>

    var PAGE_URL = 'https://neuro-pro.ai/';

    var metas = [
      ['name', 'description', DESC],
      ['name', 'robots', 'index, follow'],
      ['name', 'theme-color', '#2F2F2F'],
      ['property', 'og:type', 'website'],
      ['property', 'og:site_name', 'НейроПро+'],
      ['property', 'og:locale', 'ru_RU'],
      ['property', 'og:title', TITLE],
      ['property', 'og:description', DESC],
      ['property', 'og:url', PAGE_URL],
      ['property', 'og:image', IMG],
      ['property', 'og:image:width', '1200'],

      ['name', 'twitter:title', TITLE],
      ['name', 'twitter:description', DESC],
      ['name', 'twitter:image', IMG]
    ];
    function ensureMeta(attr, key, val) {
      var head = document.head || document.documentElement;
      var m = head.querySelector('meta[' + attr + '="' + key + '"]');
      if (!m) { m = document.createElement('meta'); m.setAttribute(attr, key); head.appendChild(m); }
      if (m.getAttribute('content') !== val) m.setAttribute('content', val);
    }
    function ensureLink(rel, href, type) {
      var head = document.head || document.documentElement;
      var l = head.querySelector('link[rel="' + rel + '"]');
